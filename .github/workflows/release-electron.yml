name: Release Electron App

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-electron-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-electron:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS Apple Silicon
            runs_on: macos-14
            artifact_name: electron-macos-arm64
          - label: macOS Intel
            runs_on: macos-13
            artifact_name: electron-macos-x64
          - label: Windows
            runs_on: windows-latest
            artifact_name: electron-windows-x64
          - label: Linux
            runs_on: ubuntu-latest
            artifact_name: electron-linux-x64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.2.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot rpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Electron distributables
        run: pnpm --dir packages/electron make

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: packages/electron/out/make/**/*
          if-no-files-found: error

      - name: Upload release assets
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: packages/electron/out/make/**/*
          fail_on_unmatched_files: true
